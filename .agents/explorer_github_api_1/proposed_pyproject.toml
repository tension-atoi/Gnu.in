[build-system]
requires = ["setuptools>=61.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "gnuin-cockpit"
version = "1.0.0"
description = "GNU.IN Pipeline Cockpit — a fast local Qt6 control panel with GitHub integration."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "PySide6>=6.6.0",
    "requests>=2.28.0",
]

[project.scripts]
gnuin-cockpit = "cockpit.__main__:main"
