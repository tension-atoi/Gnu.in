<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cathode Reliquary — ASCII Ship in a Bottle</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
            max-height: calc(100vh - 40px);
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section { margin-bottom: 32px; }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button { margin-bottom: 0; }

        .control-group { margin-bottom: 20px; }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container { display: flex; align-items: center; gap: 12px; }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 52px;
            text-align: right;
        }

        .color-group { margin-bottom: 16px; }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container { display: flex; align-items: center; gap: 8px; }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .preset-row { display: flex; gap: 6px; margin-top: 6px; }
        .preset-swatch {
            flex: 1;
            height: 22px;
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid var(--anthropic-light-gray);
            transition: transform 0.15s ease;
        }
        .preset-swatch:hover { transform: translateY(-1px); }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }

        .button-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .button-row .button { flex: 1; }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.18);
            background: #04140c;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
            padding: 80px 0;
        }

        @media (max-width: 600px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; max-height: none; }
            .canvas-area { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Cathode Reliquary</h1>
            <div class="subtitle">A low-poly ship turning forever inside a bottle of light — rendered edge-by-edge into living ASCII on a phosphor screen.</div>

            <!-- Seed Section -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="1986" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random Bottle</button>
            </div>

            <!-- Parameters Section -->
            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Rotation Speed</label>
                    <div class="slider-container">
                        <input type="range" id="rotationSpeed" min="0" max="1.5" step="0.05" value="0.5" oninput="updateParam('rotationSpeed', this.value)">
                        <span class="value-display" id="rotationSpeed-value">0.50</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Char Density</label>
                    <div class="slider-container">
                        <input type="range" id="resolution" min="84" max="190" step="2" value="132" oninput="updateParam('resolution', this.value)">
                        <span class="value-display" id="resolution-value">132</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Bottle Facets</label>
                    <div class="slider-container">
                        <input type="range" id="facets" min="5" max="14" step="1" value="8" oninput="updateParam('facets', this.value)">
                        <span class="value-display" id="facets-value">8</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Ship Scale</label>
                    <div class="slider-container">
                        <input type="range" id="shipScale" min="0.5" max="1.4" step="0.05" value="1.0" oninput="updateParam('shipScale', this.value)">
                        <span class="value-display" id="shipScale-value">1.00</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Mast Count</label>
                    <div class="slider-container">
                        <input type="range" id="mastCount" min="1" max="4" step="1" value="3" oninput="updateParam('mastCount', this.value)">
                        <span class="value-display" id="mastCount-value">3</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Sail Billow</label>
                    <div class="slider-container">
                        <input type="range" id="sailBillow" min="0" max="0.5" step="0.02" value="0.22" oninput="updateParam('sailBillow', this.value)">
                        <span class="value-display" id="sailBillow-value">0.22</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Sea Swell</label>
                    <div class="slider-container">
                        <input type="range" id="seaWaves" min="0" max="0.25" step="0.01" value="0.08" oninput="updateParam('seaWaves', this.value)">
                        <span class="value-display" id="seaWaves-value">0.08</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Phosphor Glow</label>
                    <div class="slider-container">
                        <input type="range" id="glow" min="0" max="24" step="1" value="12" oninput="updateParam('glow', this.value)">
                        <span class="value-display" id="glow-value">12</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Scanlines</label>
                    <div class="slider-container">
                        <input type="range" id="scanlines" min="0" max="1" step="0.05" value="0.5" oninput="updateParam('scanlines', this.value)">
                        <span class="value-display" id="scanlines-value">0.50</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Star Density</label>
                    <div class="slider-container">
                        <input type="range" id="starDensity" min="0" max="160" step="5" value="70" oninput="updateParam('starDensity', this.value)">
                        <span class="value-display" id="starDensity-value">70</span>
                    </div>
                </div>
            </div>

            <!-- Colors Section -->
            <div class="control-section">
                <h3>Phosphor</h3>

                <div class="color-group">
                    <label>Beam Color</label>
                    <div class="color-picker-container">
                        <input type="color" id="phosphor" value="#3df08a" onchange="updateColor('phosphor', this.value)">
                        <span class="color-value" id="phosphor-value">#3df08a</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Screen Color</label>
                    <div class="color-picker-container">
                        <input type="color" id="background" value="#04140c" onchange="updateColor('background', this.value)">
                        <span class="color-value" id="background-value">#04140c</span>
                    </div>
                </div>

                <div class="preset-row">
                    <div class="preset-swatch" style="background:#3df08a" title="Phosphor Green" onclick="applyPreset('#3df08a','#04140c')"></div>
                    <div class="preset-swatch" style="background:#ffb000" title="Amber" onclick="applyPreset('#ffb000','#160d02')"></div>
                    <div class="preset-swatch" style="background:#38e6ff" title="Cyan CRT" onclick="applyPreset('#38e6ff','#02121a')"></div>
                    <div class="preset-swatch" style="background:#ff5e7a" title="Ruby Laser" onclick="applyPreset('#ff5e7a','#190307')"></div>
                </div>
            </div>

            <!-- Actions Section -->
            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button secondary" onclick="regenerate()">Regenerate</button>
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
                <button class="button tertiary" onclick="downloadPNG()">⤓ Download PNG</button>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing cathode reliquary…</div>
            </div>
        </div>
    </div>

    <script>
    // ═══════════════════════════════════════════════════════════════════════
    //  CATHODE RELIQUARY — params
    // ═══════════════════════════════════════════════════════════════════════
    let params = {
        seed: 1986,
        rotationSpeed: 0.5,
        resolution: 132,   // columns of glyphs
        facets: 8,         // radial segments of the bottle (low-poly)
        shipScale: 1.0,
        mastCount: 3,
        sailBillow: 0.22,
        seaWaves: 0.08,
        glow: 12,
        scanlines: 0.5,
        starDensity: 70,
        phosphor: '#3df08a',
        background: '#04140c'
    };
    let defaultParams = JSON.parse(JSON.stringify(params));

    // ── Glyph alphabet: lowest honest unit of direction the grid can speak ──
    const CH = [' ', '-', '/', '|', '\\', '.', '*', '+'];
    const T = 5;                                  // depth/luminance tiers
    const TIER_ALPHA = [0.30, 0.46, 0.64, 0.84, 1.0];

    // ── Virtual camera (far enough that nothing clips behind it) ──
    const CAM_Z = 7, FOCAL = 7, SCENE_R = 2.2;
    const NEAR = CAM_Z - SCENE_R, FAR = CAM_Z + SCENE_R;

    // ── Render-time globals ──
    let cols, rows, cw, fs, lh, offsetX, offsetY, gridScale;
    let codeGrid, depthGrid, tierGrid, biasGrid;  // typed lattices
    let edges = [];                               // rigid wireframe [ax..bz]
    let stars = [];                               // {u,v,big} normalized
    let Rb = 0.82, seaLevelY = -0.62;             // bottle body radius / waterline
    let ry = 0, rx = -0.2, rz = 0;                // live rotation
    let phRGB = {r: 61, g: 240, b: 138};
    let gfx;                                       // offscreen glyph layer (for cheap bloom)

    function setup() {
        let canvas = createCanvas(1200, 1200);
        canvas.parent('canvas-container');
        pixelDensity(1);
        frameRate(30);
        textFont('Courier New');
        textAlign(LEFT, TOP);
        textStyle(NORMAL);
        gfx = createGraphics(1200, 1200);
        gfx.pixelDensity(1);
        computeMetrics();
        buildScene();
        let l = document.querySelector('.loading');
        if (l) l.style.display = 'none';
    }

    // Lattice geometry + font sizing. Recomputed when char-density changes.
    function computeMetrics() {
        cols = Math.round(params.resolution);
        let targetCharW = width * 0.985 / cols;
        push(); textFont('Courier New'); textSize(100);
        let ratio = textWidth('M') / 100;          // monospace advance per em
        pop();
        fs = targetCharW / ratio;
        push(); textFont('Courier New'); textSize(fs);
        cw = textWidth('M');
        pop();
        lh = fs * 0.92;
        rows = Math.floor(height * 0.985 / lh);
        offsetX = (width - cols * cw) / 2;
        offsetY = (height - rows * lh) / 2;
        gridScale = rows * 0.214;
        codeGrid = new Uint8Array(cols * rows);
        depthGrid = new Float32Array(cols * rows);
        tierGrid = new Uint8Array(cols * rows);
        biasGrid = new Float32Array(cols * rows);
    }

    // ═══════════════════════════════════════════════════════════════════════
    //  SCENE CONSTRUCTION — real 3D vertices, kept only as edges
    // ═══════════════════════════════════════════════════════════════════════
    let BIAS = 0;   // luminance bias for the part currently being built (+bright / −dim)
    function addEdge(a, b) { edges.push([a[0], a[1], a[2], b[0], b[1], b[2], BIAS]); }
    function addLoop(pts) { for (let i = 0; i < pts.length; i++) addEdge(pts[i], pts[(i + 1) % pts.length]); }
    function addPath(pts) { for (let i = 0; i < pts.length - 1; i++) addEdge(pts[i], pts[i + 1]); }
    function ring(y, r, seg, phase) {
        let p = [];
        for (let j = 0; j < seg; j++) {
            let th = phase + j / seg * TWO_PI;
            p.push([Math.cos(th) * r, y, Math.sin(th) * r]);
        }
        return p;
    }
    function staves(a, b) { for (let j = 0; j < a.length; j++) addEdge(a[j], b[j]); }

    function buildScene() {
        randomSeed(params.seed);
        noiseSeed(params.seed);
        edges = [];
        let seg = Math.round(params.facets);
        let phase = random(TWO_PI);                // each bottle rotated uniquely
        buildBottle(seg, phase);
        buildShip();
        buildStars();
    }

    function buildBottle(seg, phase) {
        BIAS = -0.22;                              // glass recedes
        Rb = 0.80 + random(-0.05, 0.06);
        let Rn = 0.29 + random(-0.02, 0.02);       // neck radius
        let bodyTop = 0.52 + random(-0.06, 0.08);
        // profile: [y, radius] bottom → lip
        let prof = [
            [-1.70, 0.0],
            [-1.64, Rb],
            [-1.54, Rb],
            [bodyTop, Rb],
            [bodyTop + 0.40, Rb * 0.60],
            [bodyTop + 0.66, Rn],
            [1.58, Rn],
            [1.62, Rn * 1.20],
            [1.66, Rn * 1.04]
        ];
        let rings = prof.map(p => p[1] > 0.001 ? ring(p[0], p[1], seg, phase) : null);
        // longitudinal staves between consecutive solid rings; spokes from base centre
        let base = [0, -1.70, 0];
        for (let i = 0; i < prof.length - 1; i++) {
            let a = rings[i], b = rings[i + 1];
            if (a && b) staves(a, b);
            else if (!a && b) for (let j = 0; j < b.length; j++) addEdge(base, b[j]);
        }
        // latitudinal ring loops at every solid profile point → faceted glass
        for (let r of rings) if (r) addLoop(r);

        // cork plug seated in the neck, jutting out
        BIAS = -0.02;
        let corkR = Rn * 1.02;
        let c0 = ring(1.52, corkR, seg, phase);
        let c1 = ring(1.86, corkR, seg, phase);
        addLoop(c0); addLoop(c1); staves(c0, c1);
        let capC = [0, 1.86, 0];
        for (let j = 0; j < c1.length; j++) addEdge(capC, c1[j]); // domed cork top
    }


    function buildShip() {
        let S = params.shipScale;
        BIAS = 0.55;                                 // ship burns brighter than the glass
        let hl = 1.52 * S, hb = 0.44 * S;           // hull length / beam
        let deckY = seaLevelY + 0.16 * S;
        let keelY = seaLevelY - 0.14 * S;
        let stT = [0.0, 0.2, 0.42, 0.66, 0.85, 1.0]; // stern→bow stations
        let wF = [0.62, 0.92, 1.0, 0.86, 0.5, 0.04]; // beam fraction
        let port = [], star = [], keel = [];
        for (let i = 0; i < stT.length; i++) {
            let t = stT[i];
            let xi = lerp(-hl / 2, hl / 2, t);
            let wi = wF[i] * hb / 2 * (1 + random(-0.05, 0.05));
            let s = (2 * t - 1) * (2 * t - 1);
            let gunY = deckY + 0.10 * S * s;          // sheer line rises at ends
            let kY = keelY + 0.12 * S * s;            // rocker
            port.push([xi, gunY, -wi]);
            star.push([xi, gunY, wi]);
            keel.push([xi, kY, 0]);
        }
        addPath(port); addPath(star); addPath(keel);
        for (let i = 0; i < stT.length; i++) { addEdge(port[i], keel[i]); addEdge(keel[i], star[i]); }
        addEdge(port[0], star[0]);                    // transom
        addEdge(port[1], star[1]); addEdge(port[3], star[3]); // deck thwarts
        let bow = port[port.length - 1];

        // bowsprit + jib
        let bsTip = [hl / 2 + 0.42 * S, deckY + 0.16 * S, 0];
        addEdge(bow, bsTip);

        // masts, yards, wind-filled square sails
        let mc = Math.round(params.mastCount);
        let bil = params.sailBillow;
        let mastTops = [];
        for (let m = 0; m < mc; m++) {
            BIAS = 0.55;                              // mast + yards: bright spars
            let ft = mc > 1 ? m / (mc - 1) : 0.5;
            let mx = lerp(-hl * 0.30, hl * 0.32, ft);
            let hf = 1 - 0.26 * Math.abs(ft - 0.42) * 2;
            let mh = 1.16 * S * hf * (1 + random(-0.04, 0.04));
            let rake = 0.06 * mh;                      // lean toward stern
            let baseP = [mx, deckY, 0];
            let topP = [mx - rake, deckY + mh, 0];
            addEdge(baseP, topP);
            mastTops.push(topP);
            let yH = [0.40, 0.70];
            let yW = [0.36 * S * hf, 0.27 * S * hf];
            let yc = [];
            for (let k = 0; k < 2; k++) {
                let x = lerp(baseP[0], topP[0], yH[k]);
                let y = lerp(baseP[1], topP[1], yH[k]);
                yc.push([x, y, yW[k]]);
                addEdge([x, y, -yW[k]], [x, y, yW[k]]); // yard
            }
            // sail between the two yards, bulged forward (+x) by the wind
            BIAS = 0.30;                              // canvas: mid-bright, softer than spars
            let yl = yc[0], yu = yc[1];
            let bj = bil * (0.8 + random(0, 0.4));
            let xm = (yl[0] + yu[0]) / 2 + bj, ym = (yl[1] + yu[1]) / 2;
            let wm = (yl[2] + yu[2]) / 2 * 1.06;
            addPath([[yu[0], yu[1], -yu[2]], [xm, ym, -wm], [yl[0], yl[1], -yl[2]]]);
            addPath([[yu[0], yu[1], yu[2]], [xm, ym, wm], [yl[0], yl[1], yl[2]]]);
            addEdge([yl[0], yl[1], -yl[2]], [yl[0], yl[1], yl[2]]); // foot
            addEdge([xm, ym, -wm], [xm, ym, wm]);                  // batten
        }
        // standing rigging: forestay to bowsprit, backstay to stern
        BIAS = 0.48;                                  // taut lines, just under the spars
        if (mastTops.length) {
            addEdge(mastTops[0], bsTip);
            addEdge(mastTops[mastTops.length - 1], [(-hl / 2), deckY + 0.05, 0]);
            for (let m = 0; m < mastTops.length - 1; m++) addEdge(mastTops[m], mastTops[m + 1]);
        }
        // jib triangle off the bowsprit
        if (mastTops.length) addPath([bsTip, mastTops[0], bow]);

        // pennant streaming from the tallest mast
        let tall = mastTops.reduce((a, b) => b[1] > a[1] ? b : a, mastTops[0] || [0, 0, 0]);
        if (mastTops.length) {
            let ph = random(TWO_PI);
            addPath([
                tall,
                [tall[0] + 0.34 * S, tall[1] + 0.02 + 0.03 * Math.sin(ph), 0],
                [tall[0] + 0.30 * S, tall[1] - 0.10, 0],
                tall
            ]);
        }
    }

    function buildStars() {
        stars = [];
        let n = Math.round(params.starDensity);
        for (let i = 0; i < n; i++) {
            stars.push({ u: random(1), v: random(0.86), big: random(1) < 0.16 });
        }
    }

    // ═══════════════════════════════════════════════════════════════════════
    //  PROJECTION + ASCII RASTERIZER
    // ═══════════════════════════════════════════════════════════════════════
    function rotpt(x, y, z) {
        let cy = Math.cos(ry), sy = Math.sin(ry);
        let x1 = x * cy + z * sy, z1 = -x * sy + z * cy;
        let cx = Math.cos(rx), sx = Math.sin(rx);
        let y2 = y * cx - z1 * sx, z2 = y * sx + z1 * cx;
        let cz = Math.cos(rz), sz = Math.sin(rz);
        return [x1 * cz - y2 * sz, x1 * sz + y2 * cz, z2];
    }
    function project(p) {
        let depth = CAM_Z - p[2];
        let k = FOCAL / depth;
        return [cols * 0.5 + p[0] * k * gridScale, rows * 0.5 - p[1] * k * gridScale, depth];
    }
    function glyphFor(dx, dy) {
        if (Math.abs(dx) < 1e-6 && Math.abs(dy) < 1e-6) return 5;
        let a = Math.atan2(-dy, dx) * 180 / Math.PI;   // screen-up positive
        if (a > 90) a -= 180; if (a < -90) a += 180;
        let aa = Math.abs(a);
        if (aa < 22.5) return 1;        // -
        if (aa > 67.5) return 3;        // |
        return a > 0 ? 2 : 4;           // / or \
    }
    function raster(ax, ay, ad, bx, by, bd, bias) {
        let dx = bx - ax, dy = by - ay;
        let steps = Math.max(1, Math.ceil(Math.max(Math.abs(dx), Math.abs(dy))));
        let g = glyphFor(dx, dy);
        for (let i = 0; i <= steps; i++) {
            let t = i / steps;
            let cx = Math.round(ax + dx * t), cyy = Math.round(ay + dy * t);
            if (cx < 0 || cyy < 0 || cx >= cols || cyy >= rows) continue;
            let dep = ad + (bd - ad) * t;
            let idx = cyy * cols + cx;
            if (dep < depthGrid[idx] - 1e-4) {
                depthGrid[idx] = dep; codeGrid[idx] = g; biasGrid[idx] = bias;
            } else if (Math.abs(dep - depthGrid[idx]) < 0.18 && codeGrid[idx] && codeGrid[idx] !== g && codeGrid[idx] < 5) {
                codeGrid[idx] = 7;       // crossing → +
                if (bias > biasGrid[idx]) biasGrid[idx] = bias;
            }
        }
    }
    function plotWorld(a, b, bias) {
        let A = project(rotpt(a[0], a[1], a[2]));
        let B = project(rotpt(b[0], b[1], b[2]));
        if (A[2] <= 0.2 || B[2] <= 0.2) return;
        raster(A[0], A[1], A[2], B[0], B[1], B[2], bias || 0);
    }

    function plotStars() {
        for (let s of stars) {
            let c = Math.floor(s.u * cols), r = Math.floor(s.v * rows);
            if (c < 0 || r < 0 || c >= cols || r >= rows) continue;
            let idx = r * cols + c;
            if (depthGrid[idx] > FAR + 0.4) { depthGrid[idx] = FAR + 0.45; codeGrid[idx] = s.big ? 6 : 5; biasGrid[idx] = 0; }
        }
    }

    // Liquid sea-line trapped at the bottle's base, rebuilt live so it swells.
    function drawSea(t) {
        let N = 46, seaR = Rb * 0.93, amp = params.seaWaves;
        let prev = null;
        for (let i = 0; i <= N; i++) {
            let th = i / N * TWO_PI;
            let y = seaLevelY + amp * Math.sin(th * 3 + t * 1.3) + amp * 0.5 * Math.sin(th * 5 - t * 0.9);
            let p = [Math.cos(th) * seaR, y, Math.sin(th) * seaR];
            if (prev) plotWorld(prev, p, -0.15);
            prev = p;
        }
        for (let k = 0; k < 3; k++) {
            let zz = (k - 1) * seaR * 0.5;
            let xe = Math.sqrt(Math.max(0, seaR * seaR - zz * zz)) * 0.92;
            let yA = seaLevelY + amp * Math.sin(t * 1.1 + k);
            plotWorld([-xe, yA, zz], [xe, yA + amp * 0.5 * Math.sin(t + k), zz], -0.15);
        }
    }

    function computeTiers() {
        let span = FAR - NEAR;
        for (let i = 0; i < codeGrid.length; i++) {
            if (!codeGrid[i]) continue;
            let eff = depthGrid[i] - biasGrid[i];       // bias pulls an edge "forward" in light
            let tt = (FAR - eff) / span;                // near/bright → 1
            let tier = Math.floor(tt * T);
            tierGrid[i] = tier < 0 ? 0 : tier >= T ? T - 1 : tier;
        }
    }

    function draw() {
        let t = millis() / 1000;
        ry = 0.52 + t * params.rotationSpeed * 0.6;     // start on a 3/4 view
        rx = -0.20 + 0.05 * Math.sin(t * 0.45);
        rz = 0.035 * Math.sin(t * 0.8);

        codeGrid.fill(0); depthGrid.fill(1e9); biasGrid.fill(0);
        plotStars();
        for (let e of edges) plotWorld([e[0], e[1], e[2]], [e[3], e[4], e[5]], e[6]);
        drawSea(t);
        computeTiers();
        renderGrid(t);
        postFX(t);
    }

    function renderGrid(t) {
        background(color(params.background));
        phRGB = hexToRgb(params.phosphor) || phRGB;
        let flicker = 0.90 + 0.10 * noise(t * 1.7);

        // Draw every glyph ONCE into the offscreen layer, depth → brightness.
        gfx.clear();
        gfx.textFont('Courier New'); gfx.textSize(fs); gfx.textAlign(LEFT, TOP); gfx.noStroke();
        for (let tier = 0; tier < T; tier++) {
            gfx.fill(phRGB.r, phRGB.g, phRGB.b, 255 * TIER_ALPHA[tier] * flicker);
            for (let r = 0; r < rows; r++) {
                let s = '', any = false, base = r * cols;
                for (let c = 0; c < cols; c++) {
                    let idx = base + c;
                    if (codeGrid[idx] && tierGrid[idx] === tier) { s += CH[codeGrid[idx]]; any = true; }
                    else s += ' ';
                }
                if (any) gfx.text(s, offsetX, offsetY + r * lh);
            }
        }

        // Bloom: one blurred composite of the whole layer, then the crisp layer on top.
        let glow = params.glow;
        if (glow > 0) {
            drawingContext.save();
            drawingContext.filter = 'blur(' + glow + 'px)';
            drawingContext.globalAlpha = 0.85;
            drawingContext.drawImage(gfx.canvas, 0, 0);
            drawingContext.restore();
        }
        drawingContext.drawImage(gfx.canvas, 0, 0);
    }

    // CRT surface: scanlines, vignette, gentle curvature glow — applied with restraint.
    function postFX(t) {
        let scan = params.scanlines;
        if (scan > 0) {
            stroke(0, 0, 0, scan * 72); strokeWeight(1);
            for (let y = 0; y < height; y += 3) line(0, y, width, y);
            noStroke();
        }
        let g = drawingContext.createRadialGradient(width / 2, height / 2, height * 0.18, width / 2, height / 2, height * 0.72);
        g.addColorStop(0, 'rgba(0,0,0,0)');
        g.addColorStop(1, 'rgba(0,0,0,0.55)');
        drawingContext.fillStyle = g;
        drawingContext.fillRect(0, 0, width, height);
        // faint phosphor wash near the centre
        let gp = drawingContext.createRadialGradient(width / 2, height * 0.46, 0, width / 2, height * 0.46, height * 0.6);
        gp.addColorStop(0, 'rgba(' + phRGB.r + ',' + phRGB.g + ',' + phRGB.b + ',0.05)');
        gp.addColorStop(1, 'rgba(0,0,0,0)');
        drawingContext.fillStyle = gp;
        drawingContext.fillRect(0, 0, width, height);
    }

    function hexToRgb(hex) {
        let m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return m ? { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) } : null;
    }

    // ═══════════════════════════════════════════════════════════════════════
    //  UI CONTROL HANDLERS
    // ═══════════════════════════════════════════════════════════════════════
    const INT_PARAMS = ['resolution', 'facets', 'mastCount', 'starDensity'];
    const GEOM_PARAMS = ['facets', 'shipScale', 'mastCount', 'sailBillow', 'starDensity'];

    function fmtVal(name, v) {
        if (INT_PARAMS.includes(name)) return String(Math.round(v));
        return Number(v).toFixed(2);
    }

    function updateParam(name, value) {
        let num = parseFloat(value);
        params[name] = num;
        let disp = document.getElementById(name + '-value');
        if (disp) disp.textContent = fmtVal(name, num);
        if (name === 'resolution') computeMetrics();
        else if (GEOM_PARAMS.includes(name)) buildScene();
        // rotationSpeed, seaWaves, glow, scanlines read live each frame
    }

    function updateColor(id, value) {
        params[id] = value;
        let disp = document.getElementById(id + '-value');
        if (disp) disp.textContent = value;
        if (id === 'phosphor') phRGB = hexToRgb(value) || phRGB;
    }

    function applyPreset(phos, bg) {
        updateColor('phosphor', phos);
        updateColor('background', bg);
        document.getElementById('phosphor').value = phos;
        document.getElementById('background').value = bg;
    }

    // ── Seed controls ──
    function updateSeedDisplay() { document.getElementById('seed-input').value = params.seed; }
    function updateSeed() {
        let v = parseInt(document.getElementById('seed-input').value);
        if (v && v > 0) { params.seed = v; buildScene(); } else updateSeedDisplay();
    }
    function previousSeed() { params.seed = Math.max(1, params.seed - 1); updateSeedDisplay(); buildScene(); }
    function nextSeed() { params.seed = params.seed + 1; updateSeedDisplay(); buildScene(); }
    function randomSeedAndUpdate() { params.seed = Math.floor(Math.random() * 999999) + 1; updateSeedDisplay(); buildScene(); }

    // ── Actions ──
    function regenerate() { computeMetrics(); buildScene(); }

    function resetParameters() {
        params = JSON.parse(JSON.stringify(defaultParams));
        ['rotationSpeed', 'resolution', 'facets', 'shipScale', 'mastCount', 'sailBillow', 'seaWaves', 'glow', 'scanlines', 'starDensity'].forEach(n => {
            let el = document.getElementById(n);
            if (el) el.value = params[n];
            let disp = document.getElementById(n + '-value');
            if (disp) disp.textContent = fmtVal(n, params[n]);
        });
        document.getElementById('phosphor').value = params.phosphor;
        document.getElementById('phosphor-value').textContent = params.phosphor;
        document.getElementById('background').value = params.background;
        document.getElementById('background-value').textContent = params.background;
        phRGB = hexToRgb(params.phosphor) || phRGB;
        updateSeedDisplay();
        computeMetrics();
        buildScene();
    }

    function downloadPNG() { saveCanvas('cathode-reliquary-' + params.seed, 'png'); }

    window.addEventListener('load', updateSeedDisplay);
    </script>
</body>
</html>
